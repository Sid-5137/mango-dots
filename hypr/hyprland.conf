# ─────────────────────────────────────────────────────────────
# Hyprland Config – Ported from MangoWC
# Nord / Colloid Dark theme
# ─────────────────────────────────────────────────────────────

################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@120, 0x0, 1


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$browser     = brave
$menu        = rofi -show drun -modi "drun,run,window" -show-icons -kb-element-next "" -kb-element-prev "" -kb-mode-next Tab -kb-mode-previous ISO_Left_Tab -theme ~/.config/rofi/nord-launcher.rasi


#################
### AUTOSTART ###
#################

exec-once = qs -c noctalia-shell --no-duplicate
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = QS_ICON_THEME,MacTahoe-nord-dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in         = 5
    gaps_out        = 4
    border_size     = 1
    col.active_border   = rgba(88C0D0ff)
    col.inactive_border = rgba(434C5Eff)
    resize_on_border    = true
    allow_tearing       = false
    layout              = master
}

decoration {
    rounding       = 5
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = false
        range        = 10
        render_power = 3
        color        = rgba(00000055)
    }

    blur {
        enabled      = true
        size         = 6
        passes       = 2
        noise        = 0.02
        brightness   = 0.9
        contrast     = 0.9
        vibrancy     = 0.16
        new_optimizations = false
    }
}

animations {
    enabled = true

    bezier = spring,   0.46, 1.0, 0.29, 1
    bezier = closeOut, 0.08, 0.92, 0, 1
    bezier = linear,   0, 0, 1, 1

    animation = windows,     1, 4,   spring,   slide
    animation = windowsOut,  1, 8,   closeOut, slide
    animation = windowsMove, 1, 5,   spring
    animation = fade,        1, 3,   linear
    animation = fadeIn,      1, 3,   linear
    animation = fadeOut,     1, 3,   linear
    animation = layers,      1, 4,   spring,   fade
    animation = layersIn,    1, 4,   spring,   fade
    animation = layersOut,   1, 3,   closeOut, fade
    animation = workspaces,  1, 4,   spring,   slide
    animation = border,      1, 5,   linear
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    focus_on_activate       = true
    mouse_move_enables_dpms = true
}

dwindle {
    pseudotile     = false
    preserve_split = true
}

master {
    new_status      = master
    mfact           = 0.55
    new_on_top      = true
}


#############
### INPUT ###
#############

input {
    kb_layout    = us
    kb_rules     = evdev
    follow_mouse = 1
    sensitivity  = 0
    repeat_rate  = 25
    repeat_delay = 600
    numlock_by_default = true

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

cursor {
    no_warps = false
}

# workspace_swipe removed in modern Hyprland — use gesture binds instead
gesture = 3, right, workspace, e-1
gesture = 3, left,  workspace, e+1


####################
### LAYER RULES  ###
####################

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

layerrule {
    name = rofi-blur
    match:namespace = rofi
    blur = true
    ignore_alpha = 0.5
}


######################
### WINDOW RULES   ###
######################

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = thunar-opacity
    match:class = thunar
    opacity = 0.9 override 0.9 override
}

windowrule {
    name = vesktop-workspace
    match:class = vesktop
    workspace = 4
    opacity = 0.9 override 0.9 override
}

windowrule {
    name = brave-workspace
    match:class = brave-browser
    workspace = 1
}

windowrule {
    name = code-workspace
    match:class = code-url-handler
    workspace = 2
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}


###################
### KEYBINDINGS ###
###################

$mod = SUPER

# Reload config
bind = $mod SHIFT, R, exec, hyprctl reload

# Apps
bind = $mod, R,     exec, $menu
bind = $mod, X,     exec, $terminal
bind = $mod, B,     exec, $browser
bind = $mod, E,     exec, $fileManager

# Noctalia IPC
bind = ALT,       Space,  exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mod SHIFT, C,     exec, qs -c noctalia-shell ipc call controlCenter toggle
bind = $mod,       S,     exec, qs -c noctalia-shell ipc call settings openTab appearance
bind = $mod,       L,     exec, qs -c noctalia-shell ipc call lockScreen lock
bind = $mod SHIFT, Q,     exec, qs -c noctalia-shell ipc call sessionMenu toggle
bind = $mod SHIFT, N,     exec, qs -c noctalia-shell ipc call plugin togglePanel notes-scratchpad

# Window control
bind = $mod,       Q,     killactive
bind = $mod,       Space, togglefloating
bind = $mod,       F,     fullscreen, 0
bind = $mod SHIFT, F,     fullscreen, 1

# Focus (ALT + arrows like mango)
bind = ALT, Left,  movefocus, l
bind = ALT, Right, movefocus, r
bind = ALT, Up,    movefocus, u
bind = ALT, Down,  movefocus, d

# Focus (SUPER + Tab)
bind = $mod, Tab, cyclenext

# Swap windows
bind = $mod SHIFT, Left,  swapwindow, l
bind = $mod SHIFT, Right, swapwindow, r
bind = $mod SHIFT, Up,    swapwindow, u
bind = $mod SHIFT, Down,  swapwindow, d

# Move floating windows
bind = CTRL SHIFT, Up,    moveactive, 0 -50
bind = CTRL SHIFT, Down,  moveactive, 0 50
bind = CTRL SHIFT, Left,  moveactive, -50 0
bind = CTRL SHIFT, Right, moveactive, 50 0

# Resize windows
bind = CTRL ALT, Up,    resizeactive, 0 -50
bind = CTRL ALT, Down,  resizeactive, 0 50
bind = CTRL ALT, Left,  resizeactive, -50 0
bind = CTRL ALT, Right, resizeactive, 50 0

# Gaps
bind = ALT SHIFT, X, exec, hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in -j | jq .int)+1))
bind = ALT SHIFT, Z, exec, hyprctl keyword general:gaps_in $(($(hyprctl getoption general:gaps_in -j | jq .int)-1))

# Scratchpad
bind = $mod,       minus, togglespecialworkspace, scratchpad
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad

# Workspace navigation (like mango viewtoleft/right)
bind = $mod,       Left,  workspace, e-1
bind = $mod,       Right, workspace, e+1
bind = CTRL,       Left,  movetoworkspace, e-1
bind = CTRL,       Right, movetoworkspace, e+1

# Move window to workspace and follow
bind = CTRL $mod, Left,  movetoworkspacesilent, e-1
bind = CTRL $mod, Right, movetoworkspacesilent, e+1

# Workspace switch by number
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Monitor focus
bind = ALT SHIFT, Left,  focusmonitor, l
bind = ALT SHIFT, Right, focusmonitor, r

# Move window to monitor
bind = $mod ALT, Left,  movewindow, mon:l
bind = $mod ALT, Right, movewindow, mon:r

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

####################
### MEDIA KEYS   ###
####################

bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous

####################
### SCREENSHOTS  ###
####################

bind = ,       Print, exec, flameshot gui
bind = SHIFT,  Print, exec, flameshot full -p ~/Pictures
bind = CTRL,   Print, exec, flameshot full -c


####################
### SOURCE THEME ###
####################

source = /home/sid/.config/hypr/noctalia/noctalia-colors.conf

