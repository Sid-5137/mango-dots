########################################
# WINDOW EFFECTS
########################################

blur=1
blur_layer=1
blur_optimized=0

blur_params_num_passes = 2
blur_params_radius = 6
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1

shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=5
no_radius_when_single=0

focused_opacity=1.0
unfocused_opacity=1.0


########################################
# ANIMATIONS
########################################

animations=1
layer_animations=1

animation_type_open=slide
animation_type_close=slide

animation_fade_in=1
animation_fade_out=1

tag_animation_direction=1

zoom_initial_ratio=0.3
zoom_end_ratio=0.8

fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8

animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0

animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1

animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1


########################################
# LAYOUT CONFIGURATION
########################################

# Scroller layout
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master stack layout
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0


########################################
# OVERVIEW
########################################

hotarea_size=10
enable_hotarea=0
ov_tab_mode=0

overviewgappi=5
overviewgappo=30


########################################
# APPEARANCE
########################################

gappih=5
gappiv=5
gappov=4
gappoh=4

borderpx=1

scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

no_border_when_single=0


########################################
# MISC
########################################

axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0

sloppyfocus=1
warpcursor=1

focus_cross_monitor=0
focus_cross_tag=0

enable_floating_snap=0
snap_distance=30

cursor_size=24
drag_tile_to_tile=1


########################################
# KEYBOARD
########################################

repeat_rate=25
repeat_delay=600
numlockon=1

xkb_rules_layout=us


########################################
# TRACKPAD
########################################

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1

trackpad_natural_scrolling=1
disable_while_typing=1

left_handed=0
middle_button_emulation=0

swipe_min_threshold=15
scroll-method=1


########################################
# MOUSE
########################################

mouse_natural_scrolling=0


########################################
# GESTURES
########################################

# 3-finger: focus window
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

# 4-finger: workspace
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview


########################################
# TAG RULES
########################################

tagrule=id:1,layout_name:tgmix
tagrule=id:2,layout_name:tgmix
tagrule=id:3,layout_name:tgmix
tagrule=id:4,layout_name:tgmix
tagrule=id:5,layout_name:tgmix
tagrule=id:6,layout_name:tgmix
tagrule=id:7,layout_name:tgmix
tagrule=id:8,layout_name:tgmix
tagrule=id:9,layout_name:tgmix


########################################
# KEY BINDINGS
########################################

# Reload config
bind=SUPER+SHIFT,r,reload_config

# Launcher / apps
bind=SUPER,r,spawn,rofi -show drun
bind=Alt,space,spawn,qs -c noctalia-shell ipc call launcher toggle

bind=SUPER,x,spawn,kitty
bind=SUPER,b,spawn,brave
bind=SUPER,e,spawn,thunar

bind=SUPER+SHIFT,c,spawn,qs -c noctalia-shell ipc call controlCenter toggle
bind=SUPER,s,spawn,qs -c noctalia-shell ipc call settings openTab appearance


########################################
# MEDIA KEYS
########################################

# Volume
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-


########################################
# WINDOW CONTROL
########################################

bind=SUPER,q,killclient
bind=SUPER,l,spawn, qs -c noctalia-shell ipc call lockScreen lock
bind=SUPER+SHIFT,q,spawn,qs -c noctalia-shell ipc call sessionMenu toggle

bind=SUPER,Tab,focusstack,next

bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down


########################################
# WINDOW MANAGEMENT
########################################

# Swap windows
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# Window states
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,space,togglefloating,
bind=ALT,i,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen

bind=SUPER,i,minimized
bind=SUPER,o,toggleoverlay

bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

bind=SUPER+SHIFT,n,spawn,qs -c noctalia-shell ipc call plugin togglePanel notes-scratchpad


########################################
# LAYOUT SWITCH
########################################

bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,t,setlayout,tgmix

bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,


########################################
# WORKSPACE NAVIGATION
########################################

bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0

bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0

bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0


########################################
# TAG SWITCH
########################################

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0


########################################
# MONITOR
########################################

bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right

bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right


########################################
# GAPS
########################################

bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps


########################################
# MOVE / RESIZE
########################################

bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0


########################################
# MOUSE
########################################

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


########################################
# SCREENSHOT
########################################

bind=none,Print,spawn,flameshot gui
bind=SHIFT,Print,spawn,flameshot full -p ~/Pictures
bind=CTRL,Print,spawn,flameshot full -c


########################################
# LAYER RULES
########################################

layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=blur,layer_name:rofi


########################################
# MONITOR RULE
########################################

monitorrule=name:eDP-1,width:1920,height:1080,refresh:120


########################################
# AUTOSTART
########################################

exec-once=qs -c noctalia-shell --no-duplicate
#exec-once=/usr/lib/mate-polkit/polkit-mate-authentication-agent-1
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots


########################################
# SOURCE THEME
########################################

source = /home/sid/.config/mango/noctalia.conf
